---
- name: Cài đặt Docker và Jenkins trên Azure VM
  hosts: jenkins_azure
  become: yes
  tasks:
    - name: Cập nhật hệ thống (apt update)
      apt:
        update_cache: yes
        force_apt_get: yes

    - name: Cài đặt các gói cần thiết cho Docker và Python
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
          - python3-pip
          - docker.io
        state: present

    - name: Đảm bảo Docker đã khởi động và tự động chạy khi boot
      service:
        name: docker
        state: started
        enabled: yes

    - name: Cấp quyền cho docker.sock (Để Jenkins điều khiển được Docker Host)
      file:
        path: /var/run/docker.sock
        mode: '0666'

    - name: Cài đặt thư viện Docker cho Python
      pip:
        name: docker

    - name: Dọn dẹp container cũ nếu bị trùng tên hoặc lỗi
      shell: docker rm -f jenkins || true

    - name: Khởi chạy Jenkins LTS bằng Docker
      shell: |
        docker run -d --name jenkins \
          -p 8080:8080 -p 50000:50000 \
          -v jenkins_home:/var/jenkins_home \
          -v /var/run/docker.sock:/var/run/docker.sock \
          --restart always \
          jenkins/jenkins:lts
      args:
        executable: /bin/bash
