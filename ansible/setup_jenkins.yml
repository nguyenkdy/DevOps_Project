---
- name: Cài đặt Jenkins CI Server với Java 21 (LTS mới nhất)
  hosts: jenkins_azure
  become: yes

  vars:
    # Sử dụng Key 2026 và Java 21
    jenkins_key_path: /usr/share/keyrings/jenkins-keyring.asc
    jenkins_repo: "deb [signed-by=/usr/share/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/"

  tasks:

    - name: 1. Dọn dẹp các cấu hình cũ (Tránh xung đột GPG)
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/jenkins.list
        - /usr/share/keyrings/jenkins-keyring.gpg
        - /usr/share/keyrings/jenkins-keyring.asc

    - name: 2. Cài đặt các gói cơ sở và OpenJDK 21
      apt:
        name:
          - curl
          - wget
          - gnupg
          - ca-certificates
          - apt-transport-https
          - software-properties-common
          - openjdk-21-jre  # Nâng cấp lên Java 21
          - docker.io
        state: present
        update_cache: yes

    - name: 3. Tải Jenkins GPG Key mới nhất (2026)
      get_url:
        url: https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key
        dest: "{{ jenkins_key_path }}"
        mode: '0644'
        force: yes

    - name: 4. Thêm Jenkins Repository vào hệ thống
      copy:
        dest: /etc/apt/sources.list.d/jenkins.list
        content: "{{ jenkins_repo }}\n"
        mode: '0644'

    - name: 5. Cài đặt Jenkins
      apt:
        name: jenkins
        update_cache: yes
        state: present

    - name: 6. Cài đặt Kubectl cho AWS K8s Pipeline
      shell: |
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
      args:
        creates: /usr/local/bin/kubectl

    - name: 7. Đảm bảo các dịch vụ đang chạy
      service:
        name: "{{ item }}"
        state: started
        enabled: yes
      loop: [docker, jenkins]

    - name: 8. Phân quyền cho Jenkins điều khiển Docker
      user:
        name: jenkins
        groups: docker
        append: yes

    - name: 9. Khởi động lại các dịch vụ để áp dụng thay đổi
      service:
        name: "{{ item }}"
        state: restarted
      loop: [docker, jenkins]
