---
- name: Cài đặt SonarQube Server bằng Docker Compose
  hosts: sonarqube_azure
  become: yes

  tasks:
    - name: 1. Cài đặt Docker và Docker Compose
      apt:
        name:
          - docker.io
          - docker-compose
        state: present
        update_cache: yes

    - name: 2. Tạo thư mục chứa dữ liệu SonarQube
      file:
        path: /opt/sonarqube
        state: directory
        mode: '0755'

    - name: 3. Cấu hình Docker Compose cho SonarQube
      copy:
        dest: /opt/sonarqube/docker-compose.yml
        content: |
          version: '3'
          services:
            sonarqube:
              image: sonarqube:lts-community
              ports:
                - "9000:9000"
              networks:
                - sonarnet
              environment:
                - SONAR_JDBC_URL=jdbc:postgresql://db:5432/sonar
                - SONAR_JDBC_USERNAME=sonar
                - SONAR_JDBC_PASSWORD=sonar
            db:
              image: postgres:12
              networks:
                - sonarnet
              environment:
                - POSTGRES_USER=sonar
                - POSTGRES_PASSWORD=sonar
                - POSTGRES_DB=sonar
          networks:
            sonarnet:

    - name: 4. Chỉnh sửa tham số hệ thống (SonarQube yêu cầu)
      sysctl:
        name: vm.max_map_count
        value: '262144'
        state: present
        reload: yes

    - name: 5. Khởi chạy SonarQube
      shell: docker-compose up -d
      args:
        chdir: /opt/sonarqube
